    <style>
        /* === BASE STYLES === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            width: 100%;

        }

            height: 100%;

        }

            width: 100%;
            height: 100%;
            display: block;

        /* === DIAGRAM TITLE === */
        #diagram-title {
            position: fixed;
            top: 14px;

            font-weight: 600;

            padding: 7px 12px;

            font-size: 16px;
            color: #333;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);

            user-select: none;
            line-height: 1;
        }
        .ctrl-btn:hover { background: #e8e8e8; }
        .ctrl-btn.active { background: #e8f4fd; border-color: #3498db; color: #3498db; }

        /* Search */
        .search-wrapper { position: relative; }
        #search-input {
            width: 200px;
            padding: 7px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'SF Mono', Consolas, monospace;
            outline: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
        #search-input:focus { border-color: #3498db; }
        .search-results {
            display: none;
            position: absolute;

            border-radius: 6px;

            max-height: 300px;

            padding: 8px 12px;

            font-family: 'SF Mono', Consolas, monospace;

        .search-result-item:last-child { border-bottom: none; }

        .ctrl-btn-label {
            font-size: 11px;
            display: block;
            text-align: center;
            margin-top: 2px;
            color: #888;

        .panel-brand {

            justify-content: space-between;

        .brand-terra {

            font-size: 24px;
            font-weight: 300;

            flex-direction: column;

            padding: 0 0 0 12px;

        .panel-close:hover { color: #00d4ff; }

        /* Tab bar */
        .panel-tabs {
            display: flex;

        .panel-tab:hover { color: #c8d6e5; background: #112240; }

        /* Panel content */
        .panel-body {

            overflow-y: auto;
            padding: 0;

        .panel-body::-webkit-scrollbar-track { background: #0a1628; }
        .panel-body::-webkit-scrollbar-thumb { background: #1a2a4a; border-radius: 3px; }
        .panel-section { display: none; }
        .panel-section.active { display: block; }

        .attr-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .attr-table tr { border-bottom: 1px solid #111d33; }
        .attr-table tr:hover { background: #112240; }
        .attr-key {
            padding: 8px 12px 8px 20px;

            padding: 8px 20px 8px 8px;

            text-decoration: underline;

        .attr-actions {

        .attr-action-btn {

        .related-link[data-source="sibling"]:hover { background: #1a3a5a; }

        /* Highlight clicked node - glow + pulse */
        @keyframes pulse-node {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .node-pulsing {
            transform-origin: center;
            transform-box: fill-box;
            animation: pulse-node 0.8s ease-in-out infinite;
        }
        .node-pulsing > *:not(title) {
            filter: drop-shadow(0 0 12px rgba(255,255,0,1)) drop-shadow(0 0 25px rgba(255,255,0,0.8)) drop-shadow(0 0 40px rgba(255,200,0,0.5));
        }

        /* === EDGE FLOW ANIMATION === */
        /* Short flowing line segments traced along selected edges */
        @keyframes flow-trail-pulse {
            0%, 100% { stroke-width: 2; opacity: 0.7; }
            50% { stroke-width: 3.5; opacity: 1; }
        }
        .flow-trail {
            fill: none;
            stroke: #00d4ff;
            stroke-width: 2;
            stroke-linecap: round;
            pointer-events: none;
            filter: drop-shadow(0 0 3px rgba(0,212,255,1)) drop-shadow(0 0 8px rgba(0,212,255,0.6));

            stroke: #1a3a8a;
            stroke-width: 2.5;
            stroke-linecap: round;
            opacity: 0.95;
            pointer-events: none;
        }

        var svgEl = svg.node();
        var graphDiv = d3.select('#graph');

        var zoom = d3.zoom()
            .scaleExtent([0.05, 10])
            .on('zoom', function(event) {
                svgInner.attr('transform', event.transform);
            });

        // Wrap SVG content in a <g> for zoom transforms
        var svgInner = svg.append('g').attr('class', 'zoom-layer');
        // Move all existing SVG children into the zoom layer
        svg.selectAll(':scope > :not(.zoom-layer)').each(function() {
            svgInner.node().appendChild(this);
        });

        graphDiv.call(zoom);

        function fitToScreen() {
            var bounds = svgInner.node().getBBox();
            if (!bounds.width || !bounds.height) return;
            var fullWidth = svgEl.clientWidth || window.innerWidth;
            var fullHeight = svgEl.clientHeight || window.innerHeight;
            var padding = 40;
            var scale = Math.min(
                (fullWidth - padding) / bounds.width,
                (fullHeight - padding) / bounds.height
            );
            var tx = (fullWidth - bounds.width * scale) / 2 - bounds.x * scale;
            var ty = (fullHeight - bounds.height * scale) / 2 - bounds.y * scale;
            graphDiv.transition().duration(400).call(
                zoom.transform,
                d3.zoomIdentity.translate(tx, ty).scale(scale)
            );
        }

        // Initial fit — use requestAnimationFrame to ensure SVG is laid out
        requestAnimationFrame(function() {
            requestAnimationFrame(fitToScreen);
        });

        // Zoom controls
        document.getElementById('btn-zoom-in').addEventListener('click', function() {
            graphDiv.transition().duration(200).call(zoom.scaleBy, 1.4);
        });
        document.getElementById('btn-zoom-out').addEventListener('click', function() {
            graphDiv.transition().duration(200).call(zoom.scaleBy, 0.7);
        });
        document.getElementById('btn-fit').addEventListener('click', fitToScreen);

        // =============================================
        // US3: Edge Flow Animation - on-demand for selected node
        // =============================================
        // Animate only edges connected to the currently selected node.
        // Flowing line segments trace along the path indicating direction.
        // Bidirectional edges get flows in both directions.
        var animationFrameId = null;
        var activeFlows = [];  // active flow trail elements
        var flowStartTime = 0;

        function clearFlowAnimation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            activeFlows.forEach(function(f) {
                if (f.trail && f.trail.parentNode) {
                    f.trail.parentNode.removeChild(f.trail);
                }
                if (f.underlay && f.underlay.parentNode) {
                    f.underlay.parentNode.removeChild(f.underlay);
                }
            });
            activeFlows = [];
        }

        function startFlowAnimationForNode(nodeId) {
            clearFlowAnimation();

            // Map graphviz id -> tf name to find connected edges
            var tfName = (TERRAVISION_DATA.node_id_map || {})[nodeId]
                || (TERRAVISION_DATA.cluster_id_map || {})[nodeId];
            if (!tfName) return;

            var graphdict = TERRAVISION_DATA.graphdict || {};
            var connectedTfNames = new Set();
            var bidirectional = new Set();

            // Outgoing connections
            (graphdict[tfName] || []).forEach(function(target) {
                connectedTfNames.add(target);
                // Check if target also points back (bidirectional)
                if ((graphdict[target] || []).indexOf(tfName) >= 0) {
                    bidirectional.add(target);
                }
            });
            // Incoming connections
            for (var src in graphdict) {
                if (src === tfName) continue;
                if ((graphdict[src] || []).indexOf(tfName) >= 0) {
                    connectedTfNames.add(src);
                    if ((graphdict[tfName] || []).indexOf(src) >= 0) {
                        bidirectional.add(src);
                    }
                }
            }

            // Find SVG edges that match these connections
            var reverseMap = {};
            var nmap = TERRAVISION_DATA.node_id_map || {};
            var cmap = TERRAVISION_DATA.cluster_id_map || {};
            for (var gv in nmap) reverseMap[nmap[gv]] = gv;
            for (var gv in cmap) reverseMap[cmap[gv]] = gv;

            svgInner.selectAll('.edge').each(function() {
                var titleEl = this.querySelector('title');
                if (!titleEl) return;
                var edgeTitle = titleEl.textContent.trim();
                // Edge titles look like "src&#45;&gt;dst" or "src->dst"
                var parts = edgeTitle.split(/->|&#45;&gt;/);
                if (parts.length !== 2) return;
                var srcGv = parts[0].trim();
                var dstGv = parts[1].trim();

                // Check if either end matches our selected node
                var matchesSelected = (srcGv === nodeId || dstGv === nodeId);
                if (!matchesSelected) {
                    // Also check if either end belongs to the connected tf names
                    var srcTf = nmap[srcGv] || cmap[srcGv];
                    var dstTf = nmap[dstGv] || cmap[dstGv];
                    if (srcTf !== tfName && dstTf !== tfName) return;
                }

                var pathEl = this.querySelector('path');
                if (!pathEl) return;
                var totalLength;
                try { totalLength = pathEl.getTotalLength(); } catch (e) { return; }
                if (!totalLength || totalLength < 10) return;

                // Forward flow: from src to dst
                var forwardReversed = (dstGv === nodeId);
                // If selected node is the destination, flow points TOWARD it (forward direction is fine)
                // The actual SVG path goes from src to dst, so reverse=false means dot moves src->dst

                addFlowTrail(this, pathEl, totalLength, false);

                // Bidirectional: also add reverse flow
                var srcTf2 = nmap[srcGv] || cmap[srcGv];
                var dstTf2 = nmap[dstGv] || cmap[dstGv];
                var isBidir = (
                    (srcTf2 && dstTf2 && bidirectional.has(srcTf2)) ||
                    (srcTf2 && dstTf2 && bidirectional.has(dstTf2))
                );
                if (isBidir) {
                    addFlowTrail(this, pathEl, totalLength, true);
                }
            });

            if (activeFlows.length > 0) {
                flowStartTime = performance.now();
                animationFrameId = requestAnimationFrame(animateFlows);
            }
        }

        function addFlowTrail(edgeEl, pathEl, totalLength, reversed) {
            // Bold underlay - render the full edge in thick black so it stands out
            // Only add one underlay per edge (not duplicated for bidirectional)
            var underlay = null;
            if (!edgeEl.querySelector('.edge-bold-underlay')) {
                underlay = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                underlay.setAttribute('d', pathEl.getAttribute('d'));
                underlay.setAttribute('class', 'edge-bold-underlay');
                // Insert before the original path so it renders behind
                edgeEl.insertBefore(underlay, pathEl);
            }

            var trail = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            // Clone the d attribute so the trail follows the same shape
            trail.setAttribute('d', pathEl.getAttribute('d'));
            trail.setAttribute('class', 'flow-trail');
            // Use dasharray to show only a small segment, dashoffset to animate position
            // Trail length: ~25% of path or 50px max for short edges
            var trailLength = Math.min(50, totalLength * 0.25);
            var gapLength = totalLength - trailLength;
            trail.setAttribute('stroke-dasharray', trailLength + ' ' + gapLength);
            edgeEl.appendChild(trail);

            activeFlows.push({
                trail: trail,
                underlay: underlay,
                totalLength: totalLength,
                trailLength: trailLength,
                reversed: reversed,
                offset: Math.random() * totalLength
            });
        }

        function animateFlows(timestamp) {
            if (activeFlows.length === 0) {
                animationFrameId = null;
                return;
            }
            // Speed: ~280 pixels per second
            var speed = 280 / 60;
            for (var i = 0; i < activeFlows.length; i++) {
                var f = activeFlows[i];
                f.offset = (f.offset + speed) % f.totalLength;
                // dashoffset: positive moves dash backward along path
                // For forward flow (src->dst) we want offset to decrease
                // For reversed flow we want offset to increase
                var dashoffset = f.reversed ? f.offset : (f.totalLength - f.offset);
                f.trail.setAttribute('stroke-dashoffset', dashoffset);
            }
            animationFrameId = requestAnimationFrame(animateFlows);
        }

        // Animation toggle button - now toggles "animate all edges always" mode
        var allEdgesMode = false;
        document.getElementById('btn-anim').addEventListener('click', function() {
            allEdgesMode = !allEdgesMode;
            if (allEdgesMode) {
                this.classList.add('active');
                this.title = 'Disable always-on animation';
                animateAllEdges();
            } else {
                this.classList.remove('active');
                this.title = 'Animate all edges';
                clearFlowAnimation();
                if (highlightedNode) {
                    var titleEl = highlightedNode.querySelector('title');
                    if (titleEl) startFlowAnimationForNode(titleEl.textContent.trim());
                }
            }
        });

        function animateAllEdges() {
            clearFlowAnimation();
            svgInner.selectAll('.edge').each(function() {
                var pathEl = this.querySelector('path');
                if (!pathEl) return;
                var totalLength;
                try { totalLength = pathEl.getTotalLength(); } catch (e) { return; }
                if (!totalLength || totalLength < 10) return;
                addFlowTrail(this, pathEl, totalLength, false);
            });
            if (activeFlows.length > 0) {
                animationFrameId = requestAnimationFrame(animateFlows);
            }
        }

        // =============================================
        // US2: Detail Panel - Click handlers
        // =============================================
        var panel = document.getElementById('detail-panel');
        var panelTitle = document.getElementById('panel-title');
        var panelSubtitle = document.getElementById('panel-subtitle');
        var panelInstanceBadge = document.getElementById('panel-instance-badge');
        var sectionProcessed = document.getElementById('section-processed');
        var sectionRaw = document.getElementById('section-raw');
        var relatedSection = document.getElementById('related-section');
        var relatedLinks = document.getElementById('related-links');
        var highlightedNode = null;

        function addHighlight(nodeEl) {
            removeHighlight();
            highlightedNode = nodeEl;
            d3.select(nodeEl).classed('node-pulsing', true);
        }

        function removeHighlight() {
            if (highlightedNode) {
                d3.select(highlightedNode).classed('node-pulsing', false);
            }
            highlightedNode = null;
            // Clear edge flow animation unless in always-on mode
            if (!allEdgesMode) {
                clearFlowAnimation();
            }
        }

        // Build reverse node_id_map: tfName -> gvId
        var reverseNodeMap = {};
        var nodeMap = TERRAVISION_DATA.node_id_map || {};
        for (var gvId in nodeMap) {
            reverseNodeMap[nodeMap[gvId]] = gvId;
        }

        function openPanel(nodeId, clickedEl) {
            var tfName = nodeMap[nodeId] || nodeId;

            var meta = TERRAVISION_DATA.metadata[tfName];
            var origKey = (TERRAVISION_DATA.original_name_map || {})[tfName] || tfName;
            var origMeta = TERRAVISION_DATA.original_metadata[origKey];

            // Get pretty label from the SVG node text
            var prettyLabel = '';
            if (clickedEl) {
                var textEls = clickedEl.querySelectorAll('text');
                var labels = [];
                for (var i = 0; i < textEls.length; i++) {
                    var t = textEls[i].textContent.trim();
                    if (t) labels.push(t);
                }
                prettyLabel = labels.join(' ');
            }

            panelTitle.textContent = prettyLabel || tfName;
            panelSubtitle.textContent = tfName;

            // Instance badge
            panelInstanceBadge.style.display = 'none';
            if (meta && meta._instance_info) {
                var info = meta._instance_info;
                panelInstanceBadge.style.display = 'inline-block';
                if (info.is_synthetic) {
                    panelInstanceBadge.textContent = 'Instance ' + info.instance_number + ' of ' + info.total_instances + ' (diagram only)';
                } else {
                    panelInstanceBadge.textContent = 'Instance ' + info.instance_number + ' of ' + info.total_instances;
                }
            }

            // Populate tabs
            var planAttrs = (origMeta && Object.keys(origMeta).length > 0) ? origMeta : meta;
            sectionProcessed.innerHTML = buildAttrTable(planAttrs);
            sectionRaw.innerHTML = buildAttrTable(meta);

            // Activate first tab
            document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.panel-section').forEach(function(s) { s.classList.remove('active'); });
            document.querySelector('.panel-tab[data-tab="processed"]').classList.add('active');
            sectionProcessed.classList.add('active');

            // Related resources from graphdict
            buildRelatedLinks(tfName);

            panel.classList.add('open');
        }

        function buildRelatedLinks(tfName) {
            var graphdict = TERRAVISION_DATA.graphdict || {};
            var siblings = TERRAVISION_DATA.resource_siblings || {};
            var origNameMap = TERRAVISION_DATA.original_name_map || {};

            // 1. Connected resources (from graph edges)
            var connected = new Set();
            var outgoing = graphdict[tfName] || [];
            for (var i = 0; i < outgoing.length; i++) connected.add(outgoing[i]);
            for (var src in graphdict) {
                var conns = graphdict[src];
                for (var j = 0; j < conns.length; j++) {
                    if (conns[j] === tfName) connected.add(src);
                }
            }
            connected.delete(tfName);

            var connectedArr = Array.from(connected).filter(function(r) {
                return !r.startsWith('tv_') && !r.startsWith('aws_az.') && !r.startsWith('aws_group.');
            }).sort();

            // 2. Sibling resources (same type group from original_metadata)
            // Look up using the original name if this resource was renamed
            var origName = origNameMap[tfName] || tfName;
            var siblingList = siblings[origName] || siblings[tfName] || [];

            // If still empty, try matching by stripping ~N suffix or [N] index
            if (siblingList.length === 0) {
                var baseName = tfName.replace(/~\d+$/, '').replace(/\[\d+\]$/, '');
                siblingList = siblings[baseName] || [];
            }
            // Also try the original name variants
            if (siblingList.length === 0) {
                var origBase = origName.replace(/~\d+$/, '').replace(/\[\d+\]$/, '');
                siblingList = siblings[origBase] || [];
            }
            // Last resort: search siblings keys that the current resource would match as a member
            if (siblingList.length === 0) {
                for (var sKey in siblings) {
                    var members = siblings[sKey];
                    for (var mi = 0; mi < members.length; mi++) {
                        if (members[mi] === tfName || members[mi] === origName) {
                            // Found ourselves as a member - grab siblings from the parent key
                            siblingList = siblings[sKey];
                            break;
                        }
                    }
                    if (siblingList.length > 0) break;
                }
            }

            var html = '';
            var hasContent = false;

            if (connectedArr.length > 0) {
                hasContent = true;
                html += '<div class="related-title">&#x2194; Connected Resources</div>';
                for (var k = 0; k < connectedArr.length; k++) {
                    var rName = connectedArr[k];
                    var displayName = rName.replace(/^module\.[^.]+\./, '');
                    html += '<span class="related-link" data-resource="' + escapeHtml(rName) + '" data-source="graph">' + escapeHtml(displayName) + '</span>';
                }
            }

            if (siblingList.length > 0) {
                hasContent = true;
                html += '<div class="related-title" style="margin-top:10px">&#x2261; Related (Same Type)</div>';
                for (var s = 0; s < siblingList.length; s++) {
                    var sName = siblingList[s];
                    var sDisplay = sName.replace(/^module\.[^.]+\./, '');
                    html += '<span class="related-link" data-resource="' + escapeHtml(sName) + '" data-source="sibling">' + escapeHtml(sDisplay) + '</span>';
                }
            }

            if (!hasContent) {
                relatedSection.style.display = 'none';
                return;
            }

            relatedSection.style.display = 'block';
            relatedLinks.innerHTML = html;

            // Attach click handlers
            relatedLinks.querySelectorAll('.related-link').forEach(function(link) {
                link.addEventListener('click', function() {
                    var rName = this.getAttribute('data-resource');
                    var source = this.getAttribute('data-source');
                    var gvId = reverseNodeMap[rName];

                    if (gvId) {
                        // Resource is drawn on diagram — navigate to it
                        var targetNode = null;
                        svg.selectAll('.node').each(function() {
                            var t = this.querySelector('title');
                            if (t && t.textContent.trim() === gvId) targetNode = this;
                        });
                        if (targetNode) {
                            addHighlight(targetNode);
                            if (!allEdgesMode) startFlowAnimationForNode(gvId);
                            openPanel(gvId, targetNode);
                        }
                    } else {
                        // Resource not drawn — show its metadata from original_metadata
                        showNonDrawnResource(rName);
                    }
                });
            });
        }

        function showNonDrawnResource(tfName) {
            // Show metadata for a resource that isn't on the diagram
            var origMeta = TERRAVISION_DATA.original_metadata[tfName];
            var meta = TERRAVISION_DATA.metadata[tfName];

            var parts = tfName.replace(/^module\.[^.]+\./, '').split('.');
            var resourceType = parts[0] || tfName;
            var resourceName = parts.slice(1).join('.') || '';

            panelTitle.textContent = resourceType + (resourceName ? '.' + resourceName : '');
            panelSubtitle.textContent = tfName;
            panelInstanceBadge.style.display = 'none';

            var planAttrs = (origMeta && Object.keys(origMeta).length > 0) ? origMeta : meta;
            sectionProcessed.innerHTML = buildAttrTable(planAttrs);
            sectionRaw.innerHTML = buildAttrTable(meta);

            document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.panel-section').forEach(function(s) { s.classList.remove('active'); });
            document.querySelector('.panel-tab[data-tab="processed"]').classList.add('active');
            sectionProcessed.classList.add('active');

            // Show siblings for this non-drawn resource too
            buildRelatedLinks(tfName);

            removeHighlight();
        }

        function closePanel() {
            panel.classList.remove('open');
            removeHighlight();
        }

        function buildAttrTable(attrs) {
            if (!attrs || Object.keys(attrs).length === 0) {
                return '<div class="no-metadata">No additional metadata available</div>';
            }

            var realRows = '';
            var computedRows = '';
            var realCount = 0;
            var computedCount = 0;
            var keys = Object.keys(attrs).sort();

            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                if (key === '_instance_info' || key === '_synthetic' || key === '_data_source') continue;

                var val = attrs[key];
                // Hide both "Computed (known after apply)" and null/empty values
                var isEmpty = (
                    val === 'Computed (known after apply)' ||
                    val === null ||
                    val === undefined ||
                    val === '' ||
                    (Array.isArray(val) && val.length === 0) ||
                    (typeof val === 'object' && val !== null && Object.keys(val).length === 0)
                );
                var formattedVal;
                try {
                    formattedVal = formatValue(val, key);
                } catch(e) {
                    formattedVal = '<span class="computed">Error rendering value</span>';
                }
                var rowHtml = '<tr><td class="attr-key">' + escapeHtml(key) + '</td><td class="attr-val">' + formattedVal + '</td></tr>';

                if (isEmpty) {
                    computedRows += rowHtml.replace('<tr>', '<tr class="computed-row" style="display:none">');
                    computedCount++;
                } else {
                    realRows += rowHtml;
                    realCount++;
                }
            }

            if (!realRows && !computedRows) {
                return '<div class="no-metadata">No additional metadata available</div>';
            }

            var html = '<table class="attr-table">' + realRows + computedRows + '</table>';
            if (computedCount > 0) {
                html += '<div class="computed-toggle" data-shown="false">'
                    + '<span class="computed-toggle-link">Show ' + computedCount + ' empty/computed field' + (computedCount > 1 ? 's' : '') + '</span>'
                    + '</div>';
            }
            return html;
        }

        // Store raw values for copy/expand - keyed by unique id
        var rawValues = {};

        function formatValue(val, key) {
            if (val === null || val === undefined) {
                return '<div class="attr-val-box computed">null</div>';
            }
            if (val === 'Computed (known after apply)') {
                return '<div class="attr-val-box computed">' + escapeHtml(val) + '</div>';
            }

            var rawStr;
            if (typeof val === 'object') {
                rawStr = JSON.stringify(val, null, 2);
            } else {
                rawStr = String(val);
            }

            // Generate a unique id for this value
            var uid = 'v' + Math.random().toString(36).substr(2, 8);
            rawValues[uid] = { key: key, value: rawStr };

            var displayHtml = '<div class="attr-val-box">' + escapeHtml(rawStr) + '</div>';

            // Add action buttons
            displayHtml += '<div class="attr-actions">';
            displayHtml += '<button class="attr-action-btn" onclick="copyValue(\'' + uid + '\', this)" title="Copy to clipboard">&#x2398;</button>';
            displayHtml += '<button class="attr-action-btn" onclick="expandValue(\'' + uid + '\')" title="Expand">&#x2922;</button>';
            displayHtml += '</div>';

            return displayHtml;
        }

        // Make functions globally accessible for onclick handlers
        window.copyValue = function(uid, btnEl) {
            var item = rawValues[uid];
            if (!item) return;
            navigator.clipboard.writeText(item.value).then(function() {
                btnEl.textContent = '\u2713';
                btnEl.classList.add('copied');
                setTimeout(function() {
                    btnEl.textContent = '\u2398';
                    btnEl.classList.remove('copied');
                }, 1500);
            }).catch(function() {
                // Fallback for file:// protocol where clipboard API may not work
                var ta = document.createElement('textarea');
                ta.value = item.value;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btnEl.textContent = '\u2713';
                btnEl.classList.add('copied');
                setTimeout(function() {
                    btnEl.textContent = '\u2398';
                    btnEl.classList.remove('copied');
                }, 1500);
            });
        };

        window.expandValue = function(uid) {
            var item = rawValues[uid];
            if (!item) return;
            document.getElementById('modal-field-name').textContent = item.key;
            document.getElementById('modal-content').textContent = item.value;
            document.getElementById('expand-modal').style.display = 'flex';
        };

        // Modal close handlers
        document.getElementById('modal-close').addEventListener('click', function() {
            document.getElementById('expand-modal').style.display = 'none';
        });
        document.getElementById('expand-modal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
        document.getElementById('modal-copy-btn').addEventListener('click', function() {
            var content = document.getElementById('modal-content').textContent;
            var btn = this;
            navigator.clipboard.writeText(content).then(function() {
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'Copy to clipboard'; }, 1500);
            }).catch(function() {
                var ta = document.createElement('textarea');
                ta.value = content;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'Copy to clipboard'; }, 1500);
            });
        });

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Toggle computed fields (event delegation on panel body)
        document.querySelector('.panel-body').addEventListener('click', function(e) {
            if (e.target.classList.contains('computed-toggle-link')) {
                var toggle = e.target.parentElement;
                var table = toggle.previousElementSibling;
                var shown = toggle.getAttribute('data-shown') === 'true';
                var rows = table.querySelectorAll('.computed-row');
                rows.forEach(function(r) {
                    r.style.display = shown ? 'none' : 'table-row';
                });
                toggle.setAttribute('data-shown', shown ? 'false' : 'true');
                var count = rows.length;
                e.target.textContent = shown
                    ? 'Show ' + count + ' empty/computed field' + (count > 1 ? 's' : '')
                    : 'Hide ' + count + ' empty/computed field' + (count > 1 ? 's' : '');
            }
        });

        // Tab switching
        document.querySelectorAll('.panel-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.panel-section').forEach(function(s) { s.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('section-' + tab.getAttribute('data-tab')).classList.add('active');
            });
        });

        // Close panel
        document.getElementById('panel-close').addEventListener('click', closePanel);

        // Click on SVG nodes
        svg.selectAll('.node').on('click', function(event) {
            event.stopPropagation();

            var titleEl = this.querySelector('title');
            if (!titleEl) return;
            var nodeId = titleEl.textContent.trim();

            if (!nodeId || nodeId.startsWith('tv_') || nodeId.startsWith('aws_az.')
                || nodeId.startsWith('aws_group.') || nodeId === 'cluster_'
                || nodeId.startsWith('None.None.')
                || nodeId.startsWith('_')) return;

            addHighlight(this);
            if (!allEdgesMode) startFlowAnimationForNode(nodeId);
            openPanel(nodeId, this);
        });

        // Click on SVG clusters (groups like subnets, security groups, VPCs)
        var clusterMap = TERRAVISION_DATA.cluster_id_map || {};
        svg.selectAll('.cluster').on('click', function(event) {
            event.stopPropagation();

            var titleEl = this.querySelector('title');
            if (!titleEl) return;
            var clusterId = titleEl.textContent.trim();

            // Look up terraform resource name from cluster map
            var tfName = clusterMap[clusterId];
            if (!tfName) return;

            addHighlight(this);
            if (!allEdgesMode) startFlowAnimationForNode(clusterId);
            openPanel(clusterId, this);
        });

        // Override openPanel to also check cluster_id_map
        var origNodeMap = nodeMap;
        nodeMap = Object.assign({}, origNodeMap, clusterMap);
        // Also update reverse map
        for (var cId in clusterMap) {
            reverseNodeMap[clusterMap[cId]] = cId;
        }

        // Click background to close
        svg.on('click', function() {
            closePanel();
        });

        // Escape key to close panel and modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var modal = document.getElementById('expand-modal');
                if (modal.style.display !== 'none') {
                    modal.style.display = 'none';
                } else {
                    closePanel();
                }
            }
        });

        // =============================================
        // Search box
        // =============================================
        function initSearch() {
            var searchInput = document.getElementById('search-input');
            var searchResults = document.getElementById('search-results');
            if (!searchInput) return;

            // Build searchable list from node_id_map and cluster_id_map
            var allResources = [];
            var nmap = TERRAVISION_DATA.node_id_map || {};
            var cmap = TERRAVISION_DATA.cluster_id_map || {};
            for (var gvId in nmap) {
                allResources.push({ gvId: gvId, tfName: nmap[gvId], type: 'node' });
            }
            for (var cId in cmap) {
                allResources.push({ gvId: cId, tfName: cmap[cId], type: 'cluster' });
            }

            searchInput.addEventListener('input', function() {
                var query = this.value.toLowerCase().trim();
                searchResults.innerHTML = '';
                if (query.length < 2) {
                    searchResults.style.display = 'none';
                    return;
                }
                var matches = allResources.filter(function(r) {
                    return r.tfName.toLowerCase().indexOf(query) >= 0;
                }).slice(0, 10);

                if (matches.length === 0) {
                    searchResults.style.display = 'none';
                    return;
                }

                searchResults.style.display = 'block';
                matches.forEach(function(r) {
                    var div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.textContent = r.tfName;
                    div.addEventListener('click', function() {
                        searchInput.value = '';
                        searchResults.style.display = 'none';
                        // Find the SVG element and open panel
                        var selector = r.type === 'node' ? '.node' : '.cluster';
                        var targetEl = null;
                        svg.selectAll(selector).each(function() {
                            var t = this.querySelector('title');
                            if (t && t.textContent.trim() === r.gvId) targetEl = this;
                        });
                        if (targetEl) {
                            addHighlight(targetEl);
                            if (!allEdgesMode) startFlowAnimationForNode(r.gvId);
                            openPanel(r.gvId, targetEl);
                        }
                    });
                    searchResults.appendChild(div);
                });
            });

            // Close results on outside click
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.style.display = 'none';
                }
            });
        }
        initSearch();

        console.log('TerraVision interactive diagram loaded');
    })();
    </script>
</body>
</html>
