name: CD

on:
  push:
    branches: [main]
    paths:
      - 'services/app/**'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push production image to ECR
        uses: docker/build-push-action@v7
        with:
          context: ./services/app
          file: services/app/docker/Dockerfile
          target: production
          build-args: APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deploy to App Runner
        uses: awslabs/amazon-app-runner-deploy@v2.5.2
        with:
          service: ${{ secrets.APP_RUNNER_SERVICE_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          access-role-arn: ${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}
          port: "8080"
          wait-for-service-stability-seconds: ${{ vars.APP_RUNNER_STABILITY_TIMEOUT || 900 }}

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        with:
          release: ${{ github.sha }}
          environment: dev
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}